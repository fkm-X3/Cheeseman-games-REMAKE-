[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm run build"

[dev]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/auth/register"
  to = "/.netlify/functions/auth-register"
  status = 200

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/me"
  to = "/.netlify/functions/auth-me"
  status = 200

[[redirects]]
  from = "/api/leaderboard/submit"
  to = "/.netlify/functions/leaderboard-submit"
  status = 200

[[redirects]]
  from = "/api/leaderboard/top"
  to = "/.netlify/functions/leaderboard-top"
  status = 200
